<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Supermercado Máximo — El mercado de tu barrio. Canasta familiar, productos frescos y precios justos a un clic de tu puerta." />
    <title>Supermercado Máximo — El mercado de tu barrio</title>

    <!-- Bootstrap Icons — no bloqueante -->
    <link rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
      media="print" onload="this.media='all'" />
    <noscript>
      <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" />
    </noscript>

    <!-- Preconnect solo a lo esencial -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Fuentes no bloqueantes -->
    <link rel="preload" as="style"
      href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" />
    <link rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap"
      media="print" onload="this.media='all'" />
    <noscript>
      <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" />
    </noscript>

    <!-- Contentsquare diferido — NO bloquea render -->
    <script defer src="https://t.contentsquare.net/uxa/52302a2d38a72.js"></script>
  </head>

  <body>
    <noscript>
      <iframe src="https://www.googletagmanager.com/ns.html?id=GTM-MVQ79VGX"
        height="0" width="0" style="display:none;visibility:hidden"></iframe>
    </noscript>

    <div id="raiz"></div>
    <script type="module" src="/src/main.jsx"></script>

    <!-- GTM diferido — se carga solo cuando el usuario interactúa -->
    <script>
      (function(){
        var cargado = false;
        function cargarGTM(){
          if(cargado) return;
          cargado = true;
          (function(w,d,s,l,i){
            w[l]=w[l]||[];
            w[l].push({'gtm.start':new Date().getTime(),event:'gtm.js'});
            var f=d.getElementsByTagName(s)[0],
                j=d.createElement(s),
                dl=l!='dataLayer'?'&l='+l:'';
            j.async=true;
            j.src='https://www.googletagmanager.com/gtm.js?id='+i+dl;
            f.parentNode.insertBefore(j,f);
          })(window,document,'script','dataLayer','GTM-MVQ79VGX');
          // ⚠️ NO agregar GA por separado — GTM lo maneja internamente
        }
        ['scroll','click','touchstart','keydown'].forEach(function(e){
          window.addEventListener(e, cargarGTM, {once:true, passive:true});
        });
        setTimeout(cargarGTM, 4000);
      })();
    </script>
  </body>
</html>
